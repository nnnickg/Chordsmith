name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain
        run: |
          rustup show
          cargo --version
          rustc --version

      - name: Cache
        uses: Swatinem/rust-cache@v2.8.1

      - name: Test
        run: cargo test --workspace --locked

  coverage:
    name: Core Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache
        uses: Swatinem/rust-cache@v2.8.1

      - name: Install Coverage Tool
        run: cargo install cargo-llvm-cov --version 0.8.6 --locked

      - name: chordsmith-core Line Coverage
        run: cargo llvm-cov -p chordsmith-core --locked --summary-only --fail-under-lines 40

  macos:
    name: macOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain
        run: |
          rustup show
          cargo --version
          rustc --version

      - name: Cache
        uses: Swatinem/rust-cache@v2.8.1

      - name: Install Cargo Tools
        run: cargo install --locked cargo-deny --version 0.19.4

      - name: Format
        run: cargo fmt --all --check

      - name: Test
        run: cargo test --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Dependency Policy
        run: cargo deny check

      - name: Release Build
        run: cargo build --release --locked -p chordsmith-cli

      - name: CLI Smoke
        run: |
          target/release/chordsmith identify 022000
          target/release/chordsmith analyze C7#9#11
          target/release/chordsmith voicings --limit 5 C
          target/release/chordsmith voicings --all C >/dev/null
          target/release/chordsmith completions zsh >/dev/null
